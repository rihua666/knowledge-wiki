# RSS 订阅源配置
# 运行: node scripts/rss-fetch.mjs [--dry-run] [--days=30] [--max=20]
#
# --days=N    只拉最近 N 天的文章（默认 30，设为 0 拉全部）
# --max=N     每个源最多拉 N 篇（默认 20）
# --all       忽略已读记录，重新拉取
# --dry-run   只显示不保存

# ─── AI 官方博客 ───
- url: https://openai.com/blog/rss.xml
  name: OpenAI Blog
  tags: AI, LLM, agent

- url: https://www.anthropic.com/feed
  name: Anthropic Blog
  tags: AI, context-engineering, agent, safety

